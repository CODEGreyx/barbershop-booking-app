<!DOCTYPE html>
<html>
<head>
  <title>Edit Booking</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>Edit Booking</h1>

    <form action="/update/{{ booking[0] }}" method="POST">
      <select name="barber" required>
        <option value="Marco" {% if booking[1] == "Marco" %}selected{% endif %}>Marco</option>
        <option value="Hassan" {% if booking[1] == "Hassan" %}selected{% endif %}>Hassan</option>
        <option value="Gwen" {% if booking[1] == "Gwen" %}selected{% endif %}>Gwen</option>
      </select>

      <select name="service" required>
        <option value="Haircut" {% if booking[2] == "Haircut" %}selected{% endif %}>Haircut</option>
        <option value="Beard" {% if booking[2] == "Beard" %}selected{% endif %}>Beard</option>
        <option value="Haircut + Beard" {% if booking[2] == "Haircut + Beard" %}selected{% endif %}>Haircut + Beard</option>
      </select>

      <select name="time" required>
        <option value="10:00 AM" {% if booking[3] == "10:00 AM" %}selected{% endif %}>10:00 AM</option>
        <option value="11:00 AM" {% if booking[3] == "11:00 AM" %}selected{% endif %}>11:00 AM</option>
        <option value="12:00 PM" {% if booking[3] == "12:00 PM" %}selected{% endif %}>12:00 PM</option>
        <option value="1:00 PM" {% if booking[3] == "1:00 PM" %}selected{% endif %}>1:00 PM</option>
        <option value="2:00 PM" {% if booking[3] == "2:00 PM" %}selected{% endif %}>2:00 PM</option>
        <option value="3:00 PM" {% if booking[3] == "3:00 PM" %}selected{% endif %}>3:00 PM</option>
        <option value="4:00 PM" {% if booking[3] == "4:00 PM" %}selected{% endif %}>4:00 PM</option>
        <option value="5:00 PM" {% if booking[3] == "5:00 PM" %}selected{% endif %}>5:00 PM</option>
      </select>

      <button type="submit">Update Booking</button>
    </form>
  </div>
</body>
</html>
